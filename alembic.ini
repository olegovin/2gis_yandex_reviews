# alembic.ini

[alembic]
# Path to migration scripts
script_location = alembic

# Template for revision filenames: {rev}_{slug}
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length of slug portion of filename
truncate_slug_length = 40

# Output encoding for Python files
output_encoding = utf-8

# SQLAlchemy URL is injected via env.py from pydantic-settings
# (leave blank here — do NOT put secrets in alembic.ini)
sqlalchemy.url =

[post_write_hooks]
# Optional: run black after generating migrations
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
